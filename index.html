<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTeX - Hệ Thống Kiểm Tra Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #87F5DB; }
        .bg-primary { background-color: #14BC9C; }
        .bg-primary-hover:hover { background-color: #11A58A; }
        .text-primary { color: #14BC9C; }
        .border-primary { border-color: #14BC9C; }
        .btn {
            background-color: #14BC9C;
            color: white;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn:hover { background-color: #11A58A; transform: translateY(-1px); }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; transform: none; }
        .card { background: white; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); padding: 1.5rem; }
        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #14BC9C; ring: 2px solid #14BC9C; }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) { border-color: #14BC9C; background-color: #f0fdf4; }
        .option-btn.selected { background-color: #FFD700; color: black; border-color: #b49700; font-weight: bold; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <div id="app-container" class="w-full max-w-5xl">
        <div class="flex items-center justify-between mb-6 bg-white p-4 rounded-xl shadow-md">
            <div class="flex items-center space-x-3">
                <img src="https://cdn-icons-png.flaticon.com/512/3407/3407024.png" class="h-10 w-10 object-contain" alt="Logo">
                <h1 class="text-xl font-bold text-gray-800">iTeX - Hệ Thống Kiểm Tra Online</h1>
            </div>
            <div id="user-info" class="text-sm text-gray-500">Đang tải...</div>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div>
            <p class="mt-4 text-gray-600 font-medium">Đang kết nối hệ thống...</p>
        </div>

        <div id="main-content" class="hidden fade-in">
            <div id="role-selection" class="card max-w-lg mx-auto text-center py-10">
                <h2 class="text-2xl font-bold text-gray-800 mb-8">Vui lòng chọn vai trò!</h2>
                <div class="grid grid-cols-2 gap-6">
                    <button onclick="setRole('teacher')" class="btn py-8 text-xl flex flex-col items-center justify-center gap-2">
                        <span>👨‍🏫</span>GIÁO VIÊN
                    </button>
                    <button onclick="setRole('student')" class="btn py-8 text-xl flex flex-col items-center justify-center gap-2">
                        <span>👨‍🎓</span>HỌC SINH
                    </button>
                </div>
            </div>

            <div id="teacher-view" class="hidden space-y-6">
                <div class="card">
                    <h2 class="text-2xl font-bold text-gray-800 border-b pb-4 mb-6">📝 Tạo Đề Mới</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <input type="text" id="t-name" class="input-field" placeholder="Họ tên Giáo viên *">
                        <input type="number" id="t-time" class="input-field" value="15" placeholder="Thời gian (phút)">
                    </div>
                    <div class="bg-blue-50 p-6 rounded-xl border border-blue-200 mb-8">
                        <h3 class="text-lg font-bold text-blue-800 mb-4">🚀 Nhập Liệu Excel + Ảnh</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="file" id="batch-excel" accept=".xlsx, .xls" class="text-sm">
                            <input type="file" id="batch-all-imgs" multiple accept="image/*" class="text-sm">
                        </div>
                        <button onclick="processBatchEntry(this)" class="btn mt-4 bg-blue-600">⚡ Tạo câu hỏi</button>
                    </div>
                    <div id="questions-list" class="space-y-6"></div>
                    <div class="flex gap-4 mt-6 pt-6 border-t">
                        <button onclick="addQuestion()" class="btn bg-green-500">+ Thêm Thủ Công</button>
                        <button onclick="saveExam(this)" class="btn ml-auto">💾 Lưu & Tạo Đề</button>
                    </div>
                </div>

                <div class="card">
                    <h2 class="text-2xl font-bold text-gray-800 border-b pb-4 mb-6">📊 Kết Quả</h2>
                    <div class="flex gap-4 mb-6">
                        <input type="text" id="result-exam-id" class="input-field" placeholder="Nhập Mã Đề">
                        <button onclick="loadResults()" class="btn">Xem Kết Quả</button>
                    </div>
                    <div id="results-chart-container" class="hidden mb-6 h-[300px]"><canvas id="scoreChart"></canvas></div>
                    <div id="results-table-container" class="overflow-x-auto"></div>
                </div>
            </div>

            <div id="student-view" class="hidden max-w-3xl mx-auto space-y-6">
                <div id="student-entry" class="card">
                    <h2 class="text-2xl font-bold text-center mb-6">Vào Thi</h2>
                    <input type="text" id="s-exam-id" class="input-field text-center text-xl uppercase mb-4" placeholder="MÃ ĐỀ">
                    <button onclick="checkExam()" class="btn w-full py-3">Tiếp Tục</button>
                </div>

                <div id="student-info-form" class="card hidden">
                    <h3 id="exam-info-display" class="text-center text-primary font-bold mb-4"></h3>
                    <div class="space-y-4">
                        <input type="text" id="s-name" class="input-field" placeholder="Họ và tên">
                        <input type="text" id="s-class" class="input-field" placeholder="Lớp">
                        <input type="text" id="s-school" class="input-field" placeholder="Trường">
                        <button onclick="startExam(event)" class="btn w-full bg-green-600">🚀 BẮT ĐẦU</button>
                    </div>
                </div>

                <div id="taking-exam" class="hidden">
                    <div class="sticky top-4 z-50 bg-white p-4 rounded-xl shadow-lg border-2 border-primary mb-6 flex justify-between items-center">
                        <div>
                            <span class="font-bold block" id="display-s-name"></span>
                            <span class="text-xs text-red-600" id="violation-display">Vi phạm: 0</span>
                        </div>
                        <div id="timer" class="text-2xl font-mono font-bold text-red-600">00:00</div>
                    </div>
                    <div id="exam-questions-render" class="space-y-8"></div>
                    <button onclick="submitExam()" id="btn-submit" class="btn w-full mt-8 py-4 text-xl">Nộp Bài</button>
                </div>

                <div id="student-result" class="card hidden text-center">
                    <h2 class="text-3xl font-bold text-primary">Hoàn Thành!</h2>
                    <div id="score-display-box" class="my-8 p-6 bg-yellow-50 border-2 border-yellow-400 inline-block rounded-xl">
                        <p class="text-6xl font-black" id="final-score">0.00</p>
                    </div>
                    <button onclick="location.reload()" class="btn block mx-auto">Thoát</button>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-alert-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[9999]">
        <div class="bg-white p-6 rounded-lg max-w-sm w-full text-center">
            <h3 id="modal-title" class="font-bold mb-2"></h3>
            <p id="modal-message" class="text-gray-600 mb-6"></p>
            <button id="modal-close-btn" class="btn bg-gray-500">Đóng</button>
        </div>
    </div>

    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[9999]">
        <div class="bg-white p-6 rounded-lg max-w-sm w-full text-center">
            <h3 class="font-bold mb-4">Mã Giáo Viên</h3>
            <input type="password" id="admin-key-input" class="input-field mb-4 text-center" placeholder="Nhập 'admin'">
            <button onclick="checkAdminKey()" class="btn w-full">Xác nhận</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG (Thay bằng Firebase của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyCY_WIQ_nAy4Guxg6OMRtNW-F6qhb2U4BI",
            authDomain: "flutter-ai-playground-fd478.firebaseapp.com",
            projectId: "flutter-ai-playground-fd478",
            storageBucket: "flutter-ai-playground-fd478.firebasestorage.app",
            messagingSenderId: "321777356764",
            appId: "1:321777356764:web:7ea129a40de01a4cc5c919"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "itex-default";

        let currentExamData = null;
        let examTimer = null;
        let violationCount = 0;

        window.customAlert = (msg, title = "Thông báo", cb = null) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerHTML = msg;
            const m = document.getElementById('custom-alert-modal');
            m.classList.remove('hidden');
            document.getElementById('modal-close-btn').onclick = () => {
                m.classList.add('hidden');
                if(cb) cb();
            }
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('user-info').innerText = `ID: ${u.uid.slice(0,5)}`;
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                signInAnonymously(auth);
            }
        });

        window.setRole = r => r === 'teacher' ? document.getElementById('password-modal').classList.remove('hidden') : (document.getElementById('role-selection').classList.add('hidden'), document.getElementById('student-view').classList.remove('hidden'));
        window.checkAdminKey = () => {
            if(document.getElementById('admin-key-input').value === 'admin') {
                document.getElementById('password-modal').classList.add('hidden');
                document.getElementById('role-selection').classList.add('hidden');
                document.getElementById('teacher-view').classList.remove('hidden');
            } else customAlert("Sai mã!");
        };

        // --- TEACHER LOGIC ---
        window.addQuestion = () => {
            const container = document.getElementById('questions-list');
            const idx = container.children.length;
            const div = document.createElement('div');
            div.className = "card border relative";
            div.innerHTML = `
                <button onclick="this.closest('.card').remove()" class="absolute top-2 right-2 text-red-500">✕</button>
                <p class="font-bold">Câu ${idx+1}</p>
                <select class="input-field my-2 q-type"><option value="mcq">Trắc nghiệm</option><option value="short_answer">Trả lời ngắn</option></select>
                <input type="file" accept="image/*" class="q-img-file text-xs">
                <input type="hidden" class="q-img-base64-hidden">
                <input type="text" class="input-field mt-2 q-ans-sa" placeholder="Đáp án (A, B... hoặc Text)">
            `;
            container.appendChild(div);
        };

        window.processBatchEntry = async (btn) => {
            const excel = document.getElementById('batch-excel').files[0];
            const imgs = document.getElementById('batch-all-imgs').files;
            if(!excel || imgs.length === 0) return customAlert("Thiếu file!");
            btn.disabled = true; btn.innerText = "Đang xử lý...";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                
                const container = document.getElementById('questions-list');
                container.innerHTML = '';

                for(let row of rows) {
                    if(isNaN(row[0])) continue;
                    const stt = row[0], ans = String(row[1]).trim();
                    const imgFile = Array.from(imgs).find(f => f.name.includes(`_${stt}.`) || f.name.startsWith(`${stt}.`));
                    if(!imgFile) continue;

                    const b64 = await fileToBase64(imgFile);
                    const div = document.createElement('div');
                    div.className = "card border relative";
                    div.innerHTML = `
                        <p class="font-bold text-primary">Câu ${stt} (Imported)</p>
                        <input type="hidden" class="q-type" value="mcq">
                        <input type="hidden" class="q-img-base64-hidden" value="${b64}">
                        <img src="data:image/png;base64,${b64}" class="h-20 my-2">
                        <input type="text" class="input-field q-ans-sa" value="${ans}">
                    `;
                    container.appendChild(div);
                }
                btn.disabled = false; btn.innerText = "⚡ Tạo câu hỏi";
            };
            reader.readAsArrayBuffer(excel);
        };

        const fileToBase64 = f => new Promise(res => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.readAsDataURL(f);
        });

        window.saveExam = async (btn) => {
            const name = document.getElementById('t-name').value;
            const time = document.getElementById('t-time').value;
            const qDivs = document.getElementById('questions-list').children;
            if(!name || qDivs.length === 0) return customAlert("Kiểm tra lại thông tin!");

            btn.disabled = true; btn.innerText = "Đang lưu...";
            const examId = Math.random().toString(36).slice(2,8).toUpperCase();
            const questions = [];
            
            for(let div of qDivs) {
                const b64 = div.querySelector('.q-img-base64-hidden').value || await fileToBase64(div.querySelector('.q-img-file').files[0]);
                questions.push({
                    type: div.querySelector('.q-type').value,
                    img_data: b64,
                    answer: div.querySelector('.q-ans-sa').value.trim().toUpperCase()
                });
            }

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_exams', examId), {
                teacher: name, time: parseInt(time), question_count: questions.length, scoring: { mcq: 1, sa: 1 }
            });

            for(let i=0; i<questions.length; i++) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_questions', `${examId}_${i}`), questions[i]);
            }

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_results', examId), { results: [] });
            customAlert(`Mã đề: <b>${examId}</b>`, "Thành công", () => location.reload());
        };

        window.loadResults = async () => {
            const id = document.getElementById('result-exam-id').value.toUpperCase();
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_results', id));
            if(!snap.exists()) return customAlert("Không tìm thấy!");

            const results = snap.data().results || [];
            const container = document.getElementById('results-table-container');
            
            let html = `<table class="min-w-full bg-white mt-4">
                <thead class="bg-gray-100"><tr>
                    <th class="p-2 border">Học sinh</th><th class="p-2 border">Điểm</th>
                    <th class="p-2 border">Bắt đầu</th><th class="p-2 border">Thời lượng</th>
                    <th class="p-2 border">Nộp bài</th>
                </tr></thead><tbody>`;

            results.forEach(r => {
                const start = r.startedAt ? new Date(r.startedAt) : null;
                const end = new Date(r.submittedAt);
                const duration = start ? Math.floor((end - start) / 60000) + "p" + Math.floor(((end-start)%60000)/1000) + "s" : "N/A";
                
                html += `<tr>
                    <td class="p-2 border">${r.name} (${r.class_})</td>
                    <td class="p-2 border text-center font-bold text-primary">${r.score}</td>
                    <td class="p-2 border text-center text-xs">${start ? start.toLocaleTimeString() : '-'}</td>
                    <td class="p-2 border text-center text-sm font-semibold">${duration}</td>
                    <td class="p-2 border text-center text-xs">${end.toLocaleTimeString()}</td>
                </tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        };

        // --- STUDENT LOGIC ---
        window.checkExam = async () => {
            const id = document.getElementById('s-exam-id').value.toUpperCase();
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_exams', id));
            if(!snap.exists()) return customAlert("Mã đề sai!");
            currentExamData = snap.data();
            currentExamData.id = id;
            document.getElementById('student-entry').classList.add('hidden');
            document.getElementById('student-info-form').classList.remove('hidden');
            document.getElementById('exam-info-display').innerText = `GV: ${currentExamData.teacher} | ${currentExamData.time} phút`;
        };

        window.startExam = async (e) => {
            const name = document.getElementById('s-name').value;
            const cls = document.getElementById('s-class').value;
            if(!name || !cls) return customAlert("Điền thông tin!");

            e.target.disabled = true; e.target.innerText = "Tải đề...";
            const qs = [];
            for(let i=0; i<currentExamData.question_count; i++) {
                const qSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_questions', `${currentExamData.id}_${i}`));
                qs.push(qSnap.data());
            }
            currentExamData.questions = qs;
            currentExamData.startTime = new Date().toISOString(); // Bắt đầu đếm giờ ở đây

            document.getElementById('student-info-form').classList.add('hidden');
            document.getElementById('taking-exam').classList.remove('hidden');
            document.getElementById('display-s-name').innerText = name;
            
            renderQuestions();
            startTimer(currentExamData.time);
            document.addEventListener("visibilitychange", () => document.hidden && (violationCount++, document.getElementById('violation-display').innerText = `Vi phạm: ${violationCount}`));
        };

        const renderQuestions = () => {
            const c = document.getElementById('exam-questions-render');
            currentExamData.questions.forEach((q, i) => {
                const d = document.createElement('div');
                d.className = "card";
                d.innerHTML = `
                    <p class="font-bold">Câu ${i+1}</p>
                    <img src="data:image/png;base64,${q.img_data}" class="max-h-60 mx-auto my-4">
                    <input type="text" id="ans-${i}" class="input-field" placeholder="Trả lời...">
                `;
                c.appendChild(d);
            });
        };

        const startTimer = (m) => {
            let t = m * 60;
            examTimer = setInterval(() => {
                const min = Math.floor(t/60), sec = t%60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if(t-- <= 0) { clearInterval(examTimer); submitExam(); }
            }, 1000);
        };

        window.submitExam = async () => {
            clearInterval(examTimer);
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Đang nộp...";

            let score = 0;
            currentExamData.questions.forEach((q, i) => {
                if(document.getElementById(`ans-${i}`).value.trim().toUpperCase() === q.answer) score++;
            });

            const result = {
                name: document.getElementById('s-name').value,
                class_: document.getElementById('s-class').value,
                school: document.getElementById('s-school').value,
                score: score,
                violation_count: violationCount,
                startedAt: currentExamData.startTime, // Gửi thời gian bắt đầu
                submittedAt: new Date().toISOString()
            };

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itex_results', currentExamData.id), {
                results: arrayUnion(result)
            });

            document.getElementById('taking-exam').classList.add('hidden');
            document.getElementById('student-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = score.toFixed(2);
        };
    </script>
</body>
</html>
